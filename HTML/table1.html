<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 70%;
            min-height: 100%;
            border: 1px solid black;
        }
        .box h1{
            text-align: center;
        }
        .data{
            width: 98%;
           min-height: 60px;
            border: 1px solid black;
            padding :10px ;
        }
        .data table{
            width: 90%;
            border-collapse: collapse;
            margin: auto;
        }
        .data table,
        th,
        tr,
        td{
            border: 1px solid #0000;
            padding:15px;
            text-align: center;
        }
        .data tr:nth-child(even){
            background-color: lightgoldenrodyellow;
        }
        .data tr:hover{
            background-color: lightgray;
        }
        .data table th{
            background-color: black;
            color:white;
        }
        .edit{
            width: 100px;
            padding: 10px 20px;
            background-color: royalblue;
            text-decoration: none;
            color: white;
            border: none;
            border-radius: 10px;
        }
        .del{
            width: 100px;
            padding: 10px 2px;
            background-color: tomato;
            text-decoration: none;
            color: white;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Student Marks System</h1>
        <div class="data">
        <table>
            <thead>
                <tr>
                <th>photo</th>
                <th>Name</th>
                <th>class</th>
                <th>Mobile</th>
                <th>Total Marks</th>
                <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <img src="./imgs/person.jpg" width="50px" height="50px">
                    </td>
                    <td>Rohit Sharma</td>
                    <td>BE</td>
                    <td> 245456565</td>
                    <td>100</td>
                    <td>
                        <a href="" class="edit">Edit</a>
                        <a href="" class="del">Delete</a>
                    </td>
                </tr>
                <tr><td>
                        <img src="./imgs/person.jpg" width="50px" height="50px">
                    </td>
                    <td>Rohit Sharma</td>
                    <td>BE</td>
                    <td> 245456565</td>
                    <td>100</td>
                    <td>
                        <a href="" class="edit">Edit</a>
                    </td>
                </tr>
            </tbody>

        </table>
    </div>
</body>
</html>
