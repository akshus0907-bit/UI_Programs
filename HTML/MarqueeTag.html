<!DOCTYPE html>
<html>
<head>
    <title>Moving Image Example</title>

    <style>
        body {
            background: linear-gradient(to right, lightblue, lightpink);
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: darkblue;
            margin-top: 20px;
        }

        marquee {
            margin-top: 50px;
        }

        img {
            width: 500px;
            height: 300px;
            border-radius: 15px;
            border: 4px solid white;
            box-shadow: 0px 0px 10px gray;
        }
    </style>
</head>

<body>

    <h1>Moving Image Example</h1>

    <marquee direction="left" scrollamount="10">

        <img
            src="https://wallpaperaccess.com/full/8701768.jpg"
            alt="Nature Image"
            onmouseover="this.parentElement.stop();"
            onmouseout="this.parentElement.start();">

    </marquee>

</body>
</html>
